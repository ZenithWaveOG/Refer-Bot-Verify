<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        h1 { color: #333; font-size: 2em; margin-bottom: 20px; }
        .btn { background: #667eea; color: white; border: none; padding: 15px 40px; font-size: 1.2em; border-radius: 50px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { padding: 15px; border-radius: 10px; margin-top: 20px; display: none; word-break: break-word; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        .info { background: #d1ecf1; color: #0c5460; display: block; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Verify Your Device</h1>
        <button class="btn" id="verifyBtn">VERIFY NOW</button>
        <div class="loader" id="loader"></div>
        <div class="status" id="status"></div>
        <p style="color:#666; font-size:0.9em;">One device per Telegram account.</p>
    </div>

    <script>
        // ========== CONFIG ==========
        const BOT_API_URL = 'https://autoearnx-refer-bot.onrender.com/verify';   // <-- CHANGE THIS
        const BOT_USERNAME = 'Sheinnn_Refer_Bot';                  // <-- CHANGE THIS

        // ========== Device fingerprint ==========
        async function getDeviceId() {
            const canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 50;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f60'; ctx.fillRect(10,10,100,30);
            ctx.fillStyle = '#069'; ctx.font = '16px Arial'; ctx.fillText('Fingerprint',20,25);
            const fp = canvas.toDataURL();
            const data = fp + navigator.userAgent + screen.width + screen.height + Intl.DateTimeFormat().resolvedOptions().timeZone;
            const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        // ========== UI helpers ==========
        function showLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }
        function setStatus(msg, type) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.textContent = msg;
        }

        // ========== Main ==========
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            setStatus('', '');
            showLoader(true);

            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            if (!userId) {
                setStatus('❌ Missing user ID in URL.', 'error');
                btn.disabled = false; showLoader(false); return;
            }

            try {
                const deviceId = await getDeviceId();
                console.log('Device ID:', deviceId);

                // Prepare the payload as a proper JSON object
                const payload = {
                    user_id: parseInt(userId),
                    device_id: deviceId
                };

                const response = await fetch(BOT_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)  // This creates valid JSON with double quotes
                });

                const result = await response.json();
                if (result.status === 'success') {
                    setStatus('✅ Verified! Redirecting to bot...', 'success');
                    setTimeout(() => window.location.href = `https://t.me/${BOT_USERNAME}`, 2000);
                } else {
                    // Show specific error message from server
                    if (result.message && result.message.includes('Device already used')) {
                        setStatus('❌ Authorized Declined: Device already used.', 'error');
                    } else {
                        setStatus('❌ ' + (result.message || 'Verification failed.'), 'error');
                    }
                }
            } catch (err) {
                console.error('Fetch error:', err);
                setStatus('❌ Network error. Check console.', 'error');
            } finally {
                btn.disabled = false;
                showLoader(false);
            }
        });
    </script>
</body>
</html>
