<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            transition: all 0.3s;
        }
        h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 15px;
            font-weight: 600;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
            line-height: 1.5;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin-bottom: 20px;
            width: 100%;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1em;
            display: none;
            word-break: break-word;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }
        .device-id {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8em;
            color: #666;
            word-break: break-all;
            margin-top: 20px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            color: #999;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Device Verification</h1>
        <p>Click the button below to verify your device. This links your Telegram account to this device.</p>
        
        <button class="btn" id="verifyBtn">VERIFY NOW</button>
        
        <div class="loader" id="loader"></div>
        <div class="status" id="status"></div>
        
        <div class="device-id" id="deviceIdDisplay"></div>
        <div class="footer">One device per Telegram account</div>
    </div>

    <script>
        // ================= CONFIG =================
        // IMPORTANT: Replace with your actual Render app URL (without trailing slash)
        const BOT_API_URL = 'https://autoearnx-refer-bot.onrender.com/verify';
        // Your bot username (without @)
        const BOT_USERNAME = 'Sheinnn_Refer_Bot';

        // ================= Device Fingerprint Generator =================
        async function getDeviceId() {
            try {
                // Canvas fingerprint
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.fillStyle = "#f60";
                ctx.fillRect(10, 10, 100, 30);
                ctx.fillStyle = "#069";
                ctx.font = "16px 'Arial'";
                ctx.fillText("BrowserPrint", 20, 15);
                const fingerprint = canvas.toDataURL();

                // Additional entropy
                const userAgent = navigator.userAgent;
                const screenRes = `${screen.width}x${screen.height}x${screen.colorDepth}`;
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const language = navigator.language;
                const platform = navigator.platform;
                const data = fingerprint + userAgent + screenRes + timeZone + language + platform;

                // Hash using SHA-256
                const msgBuffer = new TextEncoder().encode(data);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                return hashHex;
            } catch (error) {
                console.error('Fingerprint error:', error);
                // Fallback: generate random ID
                return 'fallback-' + Math.random().toString(36).substring(2) + Date.now();
            }
        }

        // ================= UI Helpers =================
        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status ' + type;
            statusDiv.textContent = message;
        }

        function clearStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status';
            statusDiv.style.display = 'none';
        }

        // ================= Main Verification Logic =================
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const verifyBtn = document.getElementById('verifyBtn');
            const deviceIdSpan = document.getElementById('deviceIdDisplay');
            
            // Disable button during process
            verifyBtn.disabled = true;
            verifyBtn.style.opacity = '0.6';
            clearStatus();
            showLoader(true);
            
            // Get user_id from URL
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            
            if (!userId) {
                showStatus('❌ Error: No user ID provided in URL.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.style.opacity = '1';
                showLoader(false);
                return;
            }

            try {
                // Generate device ID
                const deviceId = await getDeviceId();
                deviceIdSpan.textContent = `Device ID: ${deviceId.substring(0, 20)}...`;

                // Send verification request
                const response = await fetch(BOT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        device_id: deviceId
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    showStatus('✅ Verification successful! Redirecting to bot...', 'success');
                    setTimeout(() => {
                        window.location.href = `https://t.me/${BOT_USERNAME}`;
                    }, 2000);
                } else {
                    // Check for specific error message
                    if (result.message && result.message.includes('Device already used')) {
                        showStatus('❌ Authorized Declined: Device already used.', 'error');
                    } else {
                        showStatus('❌ ' + (result.message || 'Verification failed.'), 'error');
                    }
                    console.error('Server response:', result);
                    verifyBtn.disabled = false;
                    verifyBtn.style.opacity = '1';
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showStatus('❌ Network error. Check console or try again later.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.style.opacity = '1';
            } finally {
                showLoader(false);
            }
        });

        // Display user_id from URL on load
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            if (userId) {
                const deviceIdSpan = document.getElementById('deviceIdDisplay');
                deviceIdSpan.textContent = `Telegram ID: ${userId}`;
            }
        });
    </script>
</body>
</html>
