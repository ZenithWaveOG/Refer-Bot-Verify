<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 300px;
        }
        h1 { font-size: 24px; margin-bottom: 20px; }
        .verify-btn {
            background: linear-gradient(45deg, #FF416C, #FF4B2B);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .status { margin-top: 20px; }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid white; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Secure Verification</h1>
        <div class="loader" id="loader"></div>
        <button class="verify-btn" id="verifyBtn" onclick="verify()">VERIFY NOW</button>
        <div class="status" id="status">Click the button to continue</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function generateFingerprint() {
            let fp = localStorage.getItem('device_fp');
            if (fp) return fp;

            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = "top";
            ctx.font = "14px Arial";
            ctx.fillStyle = "#f60";
            ctx.fillRect(125, 1, 62, 20);
            ctx.fillStyle = "#069";
            ctx.font = "16px Arial";
            ctx.fillText("Telegram", 2, 15);
            ctx.fillStyle = "rgba(102,204,0,0.7)";
            ctx.font = "18px Arial";
            ctx.fillText("Verify", 4, 30);

            const canvasData = canvas.toDataURL();
            let hash = 0;
            for (let i = 0; i < canvasData.length; i++) {
                hash = ((hash << 5) - hash) + canvasData.charCodeAt(i);
                hash |= 0;
            }
            const newFp = hash.toString(36) + '-' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('device_fp', newFp);
            return newFp;
        }

        function verify() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status').innerText = 'Generating fingerprint...';
            const fingerprint = generateFingerprint();
            tg.sendData(JSON.stringify({ fingerprint: fingerprint }));
            document.getElementById('status').innerText = 'Verifying...';
        }
    </script>
</body>
</html>
